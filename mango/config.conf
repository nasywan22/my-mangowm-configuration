# More option see https://github.com/DreamMaoMao/mango/wiki/

# AUTOSTART
exec-once = skwd-daemon
exec-once = waybar
exec-once = systemctl --user start xdg-desktop-portal-wlr.service
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 &
exec-once = /home/gallahard/.config/mango/autostart.sh
exec-once = bluetoothctl power off
exec-once = swaync --config /home/gallahard/.config/swaync/config.json
exec-once = clipse -listen
exec-once = veilad

# optimizations
syncobj_enable  =   1
allow_tearing   =   1

# Window effect
border_radius         = 12
no_radius_when_single = 0
focused_opacity       = 1.0
unfocused_opacity     = 1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
animation_type_open=slide
animation_type_close=slide
animation_duration_open=600
animation_duration_close=1000
animation_duration_move=700
animation_duration_tag=500
animation_curve_open=0.42,0,0.58,1
animation_curve_close=0.42,0,0.58,1

# Scroller Layout Setting
scroller_structs                   = 20
scroller_default_proportion        = 0.8
scroller_focus_center              = 0
scroller_prefer_center             = 0
edge_scroller_pointer_focus        = 1
edge_scroller_focus_allow_speed    = 0.0
scroller_default_proportion_single = 1.0
scroller_proportion_preset         = 0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master   = 1
default_mfact   = 0.55
default_nmaster = 1
smartgaps       = 0

# Dwindle Layout Setting
dwindle_smart_split       = 0
dwindle_drop_simple_split = 0
dwindle_manual_split      = 1
dwindle_hsplit            = 1
dwindle_vsplit            = 1
dwindle_preserve_split    = 1

# Overview Setting
hotarea_size   = 10
enable_hotarea = 0
ov_tab_mode    = 1
ov_no_resize   = 1
overviewgappi  = 5
overviewgappo  = 30

# Misc
no_border_when_single      = 0
axis_bind_apply_timeout    = 100
focus_on_activate          = 1
idleinhibit_ignore_visible = 0
sloppyfocus                = 1
warpcursor                 = 1
focus_cross_monitor        = 0
focus_cross_tag            = 0
enable_floating_snap       = 0
snap_distance              = 30
cursor_size                = 24
drag_tile_to_tile          = 1
drag_tile_small            = 1

# keyboard
repeat_rate      = 25
repeat_delay     = 600
numlockon        = 0
xkb_rules_layout = us

# Trackpad
# need relogin to make it apply
disable_trackpad           = 0
tap_to_click               = 1
tap_and_drag               = 1
drag_lock                  = 1
trackpad_natural_scrolling = 0
disable_while_typing       = 1
left_handed                = 0
middle_button_emulation    = 1
swipe_min_threshold        = 1

# mouse
# need relogin to make it apply
mouse_natural_scrolling = 0

# Appearance
gappih                  = 5
gappiv                  = 5
gappoh                  = 10
gappov                  = 10
scratchpad_width_ratio  = 0.8
scratchpad_height_ratio = 0.9
borderpx                = 4
rootcolor               = 0x201b14ff
bordercolor             = 0x444444ff
dropcolor               = 0x8FBA7C55
splitcolor              = 0xEB441EFF
focuscolor              = 0xc9b890ff
maximizescreencolor     = 0x89aa61ff
urgentcolor             = 0xad401fff
scratchpadcolor         = 0x516c93ff
globalcolor             = 0xb153a7ff
overlaycolor            = 0x14a57cff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule = id:1,layout_name:dwindle
tagrule = id:2,layout_name:dwindle
tagrule = id:3,layout_name:dwindle
tagrule = id:4,layout_name:dwindle
tagrule = id:5,layout_name:dwindle
tagrule = id:6,layout_name:dwindle
tagrule = id:7,layout_name:dwindle
tagrule = id:8,layout_name:dwindle
tagrule = id:9,layout_name:dwindle

# KEYBINDS 
# key name refer to `xev` or `wev` command output, mod keys name: super,ctrl,alt,shift,none 
# Additional custom keybinds 
bind = SUPER,       code:61,    spawn_shell,    "/home/gallahard/.config/mango/mangowm-shortcuts-reader/read_mangowm_shortcuts_list" | rofi -dmenu -p "Cari Shortcut: " -matching fuzzy 
bind = SUPER+CTRL,  R,          spawn_shell,    pkill -SIGUSR2 waybar 
bind = SUPER+SHIFT, L,          spawn_shell,    veila lock && systemctl suspend 
bind = SUPER,       V,          spawn_shell,    kitty --class clipse -e "clipse"
bind = SUPER,       W,          spawn_shell,    skwd wall show
bind = SUPER+CTRL,  L,          spawn_shell,    /home/gallahard/.config/mango/layout_switcher_script/layout-switcher.sh
bind = NONE,        Print,      spawn_shell,    /home/gallahard/.config/mango/screenshot_script/ss_launcher.sh

# reload config
bind = SUPER,   r,  reload_config

# menu and terminal
bind = SUPER,   space,   spawn,     rofi -show drun      
bind = SUPER,   t    ,   spawn,     kitty

# exit
bind = SUPER+ALT,   delete  ,   quit
bind = SUPER    ,   q       ,   killclient

# switch window focus
bind = SUPER,   Left,   focusdir,   left
bind = SUPER,   Right,  focusdir,   right
bind = SUPER,   Up,     focusdir,   up
bind = SUPER,   Down,   focusdir,   down
bind = SUPER,   h,      focusdir,   left
bind = SUPER,   l,      focusdir,   right
bind = SUPER,   k,      focusdir,   up
bind = SUPER,   j,      focusdir,   down

# move window
bind = SUPER+SHIFT, Up,     exchange_client,    up
bind = SUPER+SHIFT, Down,   exchange_client,    down
bind = SUPER+SHIFT, Left,   exchange_client,    left
bind = SUPER+SHIFT, Right,  exchange_client,    right
bind = SUPER+SHIFT, k,      exchange_client,    up
bind = SUPER+SHIFT, j,      exchange_client,    down
bind = SUPER+SHIFT, h,      exchange_client,    left
bind = SUPER+SHIFT, l,      exchange_client,    right

# switch window status
bind = SUPER,       g,      toggleglobal
bind = SUPER,       Tab,    toggleoverview,
bind = SUPER+ALT,   f,      togglefloating,
bind = SUPER,       m,      togglemaximizescreen,
bind = SUPER,       f,      togglefullscreen,
bind = SUPER+SHIFT, f,      togglefakefullscreen,
bind = SUPER+SHIFT, m,      minimized,
bind = SUPER,       o,      toggleoverlay,
bind = SUPER+ALT,   I,      restore_minimized
bind = SUPER,       s,      toggle_scratchpad

# scroller layout
bind = SUPER+CTRL+ALT,  Left,   scroller_stack, left
bind = SUPER+CTRL+ALT,  Right,  scroller_stack, right
bind = SUPER+CTRL+ALT,  Up,     scroller_stack, up
bind = SUPER+CTRL+ALT,  Down,   scroller_stack, down

#dwindle layout(manual split mode)
bind = SUPER,   d,  dwindle_toggle_split_direction

# switch layout
bind = SUPER,   n,  switch_layout
bind = SUPER,   n,  spawn_shell,    pkill -SIGRTMIN+8 waybar

# tag switch
bind = SUPER+ALT,          Left,       viewtoleft,     0
bind = SUPER+ALT,          Right,      viewtoright,    0
bind = SUPER+ALT,          h,          viewtoleft,     0
bind = SUPER+ALT,          l,          viewtoright,    0
bind = SUPER+ALT+SHIFT,    Left,       tagtoleft,      0
bind = SUPER+ALT+SHIFT,    Right,      tagtoright,     0
bind = SUPER+ALT+SHIFT,    h,          tagtoleft,      0
bind = SUPER+ALT+SHIFT,    l,          tagtoright,     0

bind = SUPER+ALT,  1,  view,   1,  0
bind = SUPER+ALT,  2,  view,   2,  0
bind = SUPER+ALT,  3,  view,   3,  0
bind = SUPER+ALT,  4,  view,   4,  0
bind = SUPER+ALT,  5,  view,   5,  0
bind = SUPER+ALT,  6,  view,   6,  0
bind = SUPER+ALT,  7,  view,   7,  0
bind = SUPER+ALT,  8,  view,   8,  0
bind = SUPER+ALT,  9,  view,   9,  0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind = SUPER+ALT+SHIFT,  1,  tag,    1,  0
bind = SUPER+ALT+SHIFT,  2,  tag,    2,  0
bind = SUPER+ALT+SHIFT,  3,  tag,    3,  0
bind = SUPER+ALT+SHIFT,  4,  tag,    4,  0
bind = SUPER+ALT+SHIFT,  5,  tag,    5,  0
bind = SUPER+ALT+SHIFT,  6,  tag,    6,  0
bind = SUPER+ALT+SHIFT,  7,  tag,    7,  0
bind = SUPER+ALT+SHIFT,  8,  tag,    8,  0
bind = SUPER+ALT+SHIFT,  9,  tag,    9,  0

# monitor switch
bind = alt+shift,Left,focusmon,left
bind = alt+shift,Right,focusmon,right
bind = SUPER+Alt,Left,tagmon,left
bind = SUPER+Alt,Right,tagmon,right

# gaps
bind = ALT+SHIFT,X,incgaps,1
bind = ALT+SHIFT,Z,incgaps,-1
bind = ALT+SHIFT,R,togglegaps

# movewin
bind = SUPER+CTRL+SHIFT,    Up,     movewin,    +0,     -10
bind = SUPER+CTRL+SHIFT,    Down,   movewin,    +0,     +10
bind = SUPER+CTRL+SHIFT,    Left,   movewin,    -10,    +0
bind = SUPER+CTRL+SHIFT,    Right,  movewin,    +10,    +0
bind = SUPER+CTRL+SHIFT,    k,      movewin,    +0,     -10
bind = SUPER+CTRL+SHIFT,    j,      movewin,    +0,     +10
bind = SUPER+CTRL+SHIFT,    h,      movewin,    -10,    +0
bind = SUPER+CTRL+SHIFT,    l,      movewin,    +10,    +0

# resizewin
bind = SUPER+CTRL+ALT,    Up,     resizewin,  +0,     -10
bind = SUPER+CTRL+ALT,    Down,   resizewin,  +0,     +10
bind = SUPER+CTRL+ALT,    Left,   resizewin,  -10,    +0
bind = SUPER+CTRL+ALT,    Right,  resizewin,  +10,    +0
bind = SUPER+CTRL+ALT,    k,      resizewin,  +0,     -10
bind = SUPER+CTRL+ALT,    j,      resizewin,  +0,     +10
bind = SUPER+CTRL+ALT,    h,      resizewin,  -10,    +0
bind = SUPER+CTRL+ALT,    l,      resizewin,  +10,    +0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind = SUPER,btn_left,moveresize,curmove
mousebind = NONE,btn_middle,togglemaximizescreen,0
mousebind = SUPER,btn_right,moveresize,curresize


# Axis Bindings
axisbind = SUPER,UP,viewtoleft_have_client
axisbind = SUPER,DOWN,viewtoright_have_client

# fn key bindings
# Audio
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SINK@ toggle
bind=SHIFT,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SOURCE@ toggle

# Brightness
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl s +2%
bind=SHIFT,XF86MonBrightnessUp,spawn,brightnessctl s 100%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl s 2%-
bind=SHIFT,XF86MonBrightnessDown,spawn,brightnessctl s 1%

# Media Player
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPrev,spawn,playerctl previous
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause

# layer rule
layerrule = animation_type_open:slide,layer_name:rofi
layerrule = animation_type_close:slide,layer_name:rofi

# Window rules
windowrule = isfloating:1,appid:qt-sudo
windowrule = isfloating:1,width:1000,height:1000,appid:clipse
windowrule = isfloating:1,width:1000,height:1000,appid:nmtui
windowrule = isfloating:1,width:1000,height:1000,appid:bluetui
windowrule = isfloating:1,appid:com.github.wwmm.easyeffects
windowrule = isfloating:1,appid:org.pulseaudio.pavucontrol
windowrule = force_tearing:1,appid:tf_linux64
